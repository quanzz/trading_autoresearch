# Trading Autoresearch Configuration
# Edit this file to set your trading parameters.
# The agent will NOT modify this file — it only reads it.

data:
  directory: "./data"           # Directory containing CSV data files
  symbols:                      # List of instrument symbols to trade
    - "IF99.CFFEX"

account:
  initial_capital: 10000000.0    # Starting capital
  commission_rate: 0.000023       # Commission as fraction of trade value (0.03%)
  slippage_rate: 0.0001         # Slippage as fraction of price (0.01%)
  multiplier: 300             # Contract multiplier (e.g., gold futures = 1000)
  allow_short: true             # Allow short selling

backtest:
  warmup_bars: 50               # Bars needed for indicator calculation
  time_budget_seconds: 300      # Max wall-clock time per backtest (5 minutes)

metrics:
  mdd_weight: 0.6               # Weight for Max Drawdown (higher priority)
  sharpe_weight: 0.4            # Weight for Sharpe Ratio
  risk_free_rate: 0.018          # Annualized risk-free rate
